<!DOCTYPE html>
<html>
<head>
    <title>Student List</title>
</head>
<body>

<h2>Student List</h2>

<table border="1" cellpadding="10">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student["id"] }}</td>
        <td>{{ student["name"] }}</td>
        <td>{{ student["age"] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
